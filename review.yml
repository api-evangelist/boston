    summary: >-
      Boston University's public, machine-readable API footprint is limited. The
      one clearly public, documented-by-protocol interface verified live is the
      OpenBU DSpace OAI-PMH endpoint, which returned a valid Identify response
      (repositoryName "OpenBU"). An internal "WEB APIs" portal at webapi.bu.edu
      is referenced but does not resolve publicly (NXDOMAIN / connection refused
      from off-network), so it is treated as gated and no endpoints were
      invented. AI API access via Azure OpenAI / Amazon Bedrock is gated behind a
      request form. The bu-ist GitHub org exists but hosts WordPress tooling, not
      open API specs. No fabricated endpoints; all entries reflect probed status.
    endpoints:
